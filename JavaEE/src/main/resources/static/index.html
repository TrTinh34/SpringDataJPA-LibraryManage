<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Sách Thư Viện - Lexicon Lib</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="d-flex">
    <div class="sidebar p-4 d-none d-md-block shadow-sm">
        <div class="sidebar-logo mb-5">
            <div class="icon-box"><i class="fas fa-user-circle"></i></div>
            <div>
                <h5 class="mb-0 fw-bold" style="color: #1e3a8a;">Thư viện</h5>
                <small class="text-muted">System Admin</small>
            </div>
        </div>

        <div class="nav-item active-menu mb-2">
            <a href="index.html" class="nav-link-custom">
                <i class="fas fa-th-large me-2"></i>
                Quản lý sách
            </a>
        </div>

        <div class="nav-item mb-2">
            <a href="category.html" class="nav-link-custom">
                <i class="fas fa-tags me-2"></i>
                Quản lý thể loại
            </a>
        </div>

    </div>

    <div class="flex-grow-1 p-4 p-md-5">

        <div class="d-flex justify-content-between align-items-center mb-4">
            <div class="d-flex align-items-center gap-3">
                <div class="p-3 bg-white border rounded-3 text-primary fs-4 shadow-sm">
                    <i class="fas fa-book-open"></i>
                </div>
                <div>
                    <h3 class="mb-1 fw-bold">Quản lý Sách Thư viện</h3>
                    <p class="text-muted mb-0 small">Quản lý kho sách, chỉnh sửa thông tin và theo dõi tình trạng.</p>
                </div>
            </div>
            <button class="btn btn-primary-dark shadow-sm" data-bs-toggle="modal" data-bs-target="#bookModal" id="btnAddBook">
                <i class="fas fa-plus me-1"></i> Thêm Sách Mới
            </button>
        </div>

        <div class="filter-container mb-4 shadow-sm">
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label small text-muted">Tìm kiếm sách</label>
                    <div class="input-group">
                        <span class="input-group-text custom-bg"><i class="fas fa-search"></i></span>
                        <input type="text" id="searchInput" class="form-control custom-input input-with-icon" placeholder="Nhập tên sách...">
                    </div>
                </div>

                <div class="col-md-3">
                    <label class="form-label small text-muted">Thể loại</label>
                    <select id="categoryFilter" class="form-select custom-input">
                        <option value="">Tất cả thể loại</option>
                        <option value="1">Văn học cổ điển</option>
                        <option value="2">Lịch sử</option>
                        <option value="3">Tâm lý học</option>
                    </select>
                </div>

                <div class="col-md-3">
                    <label class="form-label small text-muted">Sắp xếp theo</label>
                    <select id="sortBy" class="form-select custom-input">
                        <option value="">Mặc định</option>
                        <option value="title_asc">Tên (A-Z)</option>
                        <option value="title_desc">Tên (Z-A)</option>
                        <option value="price_asc">Giá (Tăng dần)</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="mb-3">
            <span class="result-badge" id="resultCount">Tìm thấy 0 kết quả</span>
        </div>

        <div class="custom-table-card shadow-sm">
            <table class="table align-middle">
                <thead>
                <tr>
                    <!--<th class="text-center">ID</th>-->
                    <th>TÊN SÁCH</th>
                    <th>TÁC GIẢ</th>
                    <th class="text-center">NĂM XB</th>
                    <th>GIÁ (VNĐ)</th>
                    <th>THỂ LOẠI</th>
                    <th class="text-center">HÀNH ĐỘNG</th>
                </tr>
                </thead>
                <tbody id="bookTableBody">
                </tbody>
            </table>

            <div class="pagination-container bg-white">
                <div id="pageInfo">Hiển thị 1 đến 3 trong số 45 mục</div>
                <ul class="pagination pagination-sm mb-0">

                </ul>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="bookModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow">
            <div class="modal-header bg-light">
                <h5 class="modal-title fw-bold" id="modalTitle">Thêm Sách Mới</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="bookForm">
                    <input type="hidden" id="bookId">
                    <div class="mb-3">
                        <label class="form-label text-muted small fw-bold">TÊN SÁCH</label>
                        <input type="text" class="form-control custom-input" id="bookTitle" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-muted small fw-bold">TÁC GIẢ</label>
                        <input type="text" class="form-control custom-input" id="bookAuthor" required>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label text-muted small fw-bold">NĂM XUẤT BẢN</label>
                            <input type="number" class="form-control custom-input" id="bookYear" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label text-muted small fw-bold">GIÁ (VNĐ)</label>
                            <input type="number" class="form-control custom-input" id="bookPrice" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-muted small fw-bold">THỂ LOẠI</label>
                        <select id="bookCategory" class="form-select custom-input" required>
                            <option value="1">Văn học cổ điển</option>
                            <option value="2">Lịch sử</option>
                            <option value="3">Tâm lý học</option>
                        </select>
                    </div>
                </form>
            </div>
            <div class="modal-footer border-0">
                <button type="button" class="btn btn-light" data-bs-dismiss="modal">Đóng</button>
                <button type="button" class="btn btn-primary-dark" id="btnSaveBook">Lưu Sách</button>
            </div>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/app.js"></script>
</body>
</html>
