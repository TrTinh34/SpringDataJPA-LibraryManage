<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Thể Loại - Lexicon Lib</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="d-flex">

    <!-- SIDEBAR -->
    <div class="sidebar p-4 d-none d-md-block shadow-sm">

        <div class="sidebar-logo mb-5">
            <div class="icon-box">
                <i class="fas fa-user-circle"></i>
            </div>

            <div>
                <h5 class="mb-0 fw-bold" style="color: #1e3a8a;">
                    Thư viện
                </h5>

                <small class="text-muted">
                    System Admin
                </small>
            </div>
        </div>

        <div class="nav-item mb-2">
            <a href="index.html" class="nav-link-custom">
                <i class="fas fa-th-large me-2"></i>
                Quản lý sách
            </a>
        </div>

        <div class="nav-item active-menu mb-2">
            <a href="category.html" class="nav-link-custom">
                <i class="fas fa-tags me-2"></i>
                Quản lý thể loại
            </a>
        </div>

    </div>

    <!-- CONTENT -->
    <div class="flex-grow-1 p-4 p-md-5">

        <!-- HEADER -->
        <div class="d-flex justify-content-between align-items-center mb-4">

            <div class="d-flex align-items-center gap-3">

                <div class="p-3 bg-white border rounded-3 text-primary fs-4 shadow-sm">
                    <i class="fas fa-tags"></i>
                </div>

                <div>
                    <h3 class="mb-1 fw-bold">
                        Quản lý Thể Loại
                    </h3>

                    <p class="text-muted mb-0 small">
                        Quản lý danh mục thể loại sách trong thư viện.
                    </p>
                </div>

            </div>

            <button
                    class="btn btn-primary-dark shadow-sm"
                    data-bs-toggle="modal"
                    data-bs-target="#categoryModal"
                    id="btnAddCategory">

                <i class="fas fa-plus me-1"></i>
                Thêm Thể Loại

            </button>

        </div>

        <!-- SEARCH -->
        <div class="filter-container mb-4 shadow-sm">

            <div class="row g-3">

                <div class="col-md-12">

                    <label class="form-label small text-muted">
                        Tìm kiếm thể loại
                    </label>

                    <div class="input-group">

                        <span class="input-group-text custom-bg">
                            <i class="fas fa-search"></i>
                        </span>

                        <input
                                type="text"
                                id="searchCategory"
                                class="form-control custom-input input-with-icon"
                                placeholder="Nhập tên thể loại...">

                    </div>

                </div>

            </div>

        </div>

        <!-- RESULT -->
        <div class="mb-3">
            <span class="result-badge" id="categoryResultCount">
                Tìm thấy 0 kết quả
            </span>
        </div>

        <!-- TABLE -->
        <div class="custom-table-card shadow-sm">

            <table class="table align-middle">

                <thead>
                <tr>
                    <th>TÊN THỂ LOẠI</th>
                    <th class="text-center">HÀNH ĐỘNG</th>
                </tr>
                </thead>

                <tbody id="categoryTableBody">
                </tbody>

            </table>

            <!-- PAGINATION (thêm ul so với bản cũ) -->
            <div class="pagination-container bg-white">
                <div id="pageInfo">Hiển thị 0 mục</div>
                <ul class="pagination pagination-sm mb-0">
                    <!-- category.js sẽ tự render vào đây -->
                </ul>
            </div>

        </div>

    </div>

</div>

<!-- MODAL -->
<div class="modal fade" id="categoryModal" tabindex="-1">

    <div class="modal-dialog modal-dialog-centered">

        <div class="modal-content border-0 shadow">

            <div class="modal-header bg-light">

                <h5 class="modal-title fw-bold" id="categoryModalTitle">
                    Thêm Thể Loại
                </h5>

                <button
                        type="button"
                        class="btn-close"
                        data-bs-dismiss="modal">
                </button>

            </div>

            <div class="modal-body">

                <form id="categoryForm">

                    <input type="hidden" id="categoryId">

                    <div class="mb-3">

                        <label class="form-label text-muted small fw-bold">
                            TÊN THỂ LOẠI
                        </label>

                        <input
                                type="text"
                                id="categoryName"
                                class="form-control custom-input"
                                required>

                    </div>

                </form>

            </div>

            <div class="modal-footer border-0">

                <button
                        type="button"
                        class="btn btn-light"
                        data-bs-dismiss="modal">
                    Đóng
                </button>

                <button
                        type="button"
                        class="btn btn-primary-dark"
                        id="btnSaveCategory">
                    Lưu Thể Loại
                </button>

            </div>

        </div>

    </div>

</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/category.js"></script>

</body>
</html>
